name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build -c release
      - name: Package
        run: |
          mkdir -p dist
          cp .build/release/orbital dist/orbital
          chmod +x dist/orbital
          tar -czf orbital-darwin-arm64.tar.gz -C dist orbital
      - uses: actions/upload-artifact@v4
        with:
          name: orbital-darwin-arm64
          path: orbital-darwin-arm64.tar.gz

  build-linux-x86_64:
    runs-on: ubuntu-latest
    container: swift:6.0
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build -c release
      - name: Package
        run: |
          mkdir -p dist
          cp .build/release/orbital dist/orbital
          chmod +x dist/orbital
          tar -czf orbital-linux-x86_64.tar.gz -C dist orbital
      - uses: actions/upload-artifact@v4
        with:
          name: orbital-linux-x86_64
          path: orbital-linux-x86_64.tar.gz

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    container: swift:6.0
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build -c release
      - name: Package
        run: |
          mkdir -p dist
          cp .build/release/orbital dist/orbital
          chmod +x dist/orbital
          tar -czf orbital-linux-arm64.tar.gz -C dist orbital
      - uses: actions/upload-artifact@v4
        with:
          name: orbital-linux-arm64
          path: orbital-linux-arm64.tar.gz

  release:
    needs: [build-macos-arm64, build-linux-x86_64, build-linux-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$tag" \
            --generate-notes \
            artifacts/orbital-darwin-arm64/orbital-darwin-arm64.tar.gz \
            artifacts/orbital-linux-x86_64/orbital-linux-x86_64.tar.gz \
            artifacts/orbital-linux-arm64/orbital-linux-arm64.tar.gz
